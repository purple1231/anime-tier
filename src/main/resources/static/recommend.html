<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Anime Recommender</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #0b0f19;
            --surface-color: #151b2b;
            --surface-hover: #1e2638;
            --primary-color: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent-color: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --tag-default: #1e293b;
            --tag-selected: #3b82f6;
            --tag-priority: #ec4899;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', 'Noto Sans KR', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at top, #1e1b4b 0%, var(--bg-color) 40%);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #a5b4fc 0%, #c084fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        .search-container {
            position: relative;
            max-width: 700px;
            margin: 0 auto 50px;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .search-box {
            display: flex;
            background: var(--surface-color);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .search-box textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 15px 20px;
            resize: none;
            outline: none;
            font-family: inherit;
            height: 60px;
            overflow: hidden;
            line-height: 1.5;
        }

        .search-box textarea::placeholder {
            color: #475569;
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary-color), #8b5cf6);
            color: white;
            border: none;
            border-radius: 15px;
            padding: 0 30px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px var(--primary-glow);
        }

        .search-btn:active {
            transform: translateY(0);
        }

        /* Loading Spinner */
        .loader-container {
            display: none;
            text-align: center;
            padding: 40px 0;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid var(--surface-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        /* Tags Section */
        .tags-section {
            display: none;
            background: rgba(21, 27, 43, 0.7);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        .tags-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tags-header i {
            color: var(--primary-color);
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            background: var(--tag-default);
            color: var(--text-muted);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .tag.selected {
            background: rgba(59, 130, 246, 0.15);
            color: #60a5fa;
            border-color: var(--tag-selected);
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
        }

        .tag.priority {
            background: rgba(236, 72, 153, 0.15);
            color: #f472b6;
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.3);
            font-weight: 700;
        }

        .tag.priority::before {
            content: '⭐ ';
        }

        /* Anime Grid */
        .results-header {
            display: none;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .anime-card {
            background: var(--surface-color);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border-color: var(--primary-color);
            z-index: 2;
        }

        .cover-img-wrapper {
            position: relative;
            width: 100%;
            height: 350px;
            overflow: hidden;
        }

        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .anime-card:hover .cover-img {
            transform: scale(1.05);
        }

        .score-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(5px);
            color: #fbbf24;
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .card-content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .anime-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .anime-synopsis {
            font-size: 0.9rem;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 15px;
            flex: 1;
        }

        .anime-overlay-synopsis {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(11, 15, 25, 0.95);
            backdrop-filter: blur(8px);
            padding: 25px;
            opacity: 0;
            transition: all 0.3s ease;
            overflow-y: auto;
            transform: translateY(20px);
            display: flex;
            flex-direction: column;
        }

        .anime-card:hover .anime-overlay-synopsis {
            opacity: 1;
            transform: translateY(0);
        }

        .overlay-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: white;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .overlay-text {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.7;
        }

        /* Animations */
        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Custom Scrollbar for Overlay */
        .anime-overlay-synopsis::-webkit-scrollbar {
            width: 6px;
        }

        .anime-overlay-synopsis::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }

        .anime-overlay-synopsis::-webkit-scrollbar-thumb {
            background: var(--primary-color);
            border-radius: 10px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }

            .search-box {
                flex-direction: column;
                padding: 15px;
            }

            .search-box textarea {
                height: 80px;
            }

            .search-btn {
                padding: 15px;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <header>
            <h1>Discover Your Next Anime</h1>
            <p>Our AI analyzes your taste and stories to find the perfect anime for you.</p>
        </header>

        <main>
            <div class="search-container">
                <div class="search-box">
                    <textarea id="promptInput"
                        placeholder="Feel free to describe the story or vibe you want to watch! (e.g. Cyberpunk dystopia, artificial intelligence, spectacular action)"></textarea>
                    <button id="searchBtn" class="search-btn">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> <span>Get Recommendations</span>
                    </button>
                </div>
            </div>

            <div id="loader" class="loader-container">
                <div class="loader"></div>
                <p>Wait a second! The AI model is extracting tags and generating recommendations...</p>
            </div>

            <div id="tagsSection" class="tags-section">
                <div class="tags-header">
                    <i class="fa-solid fa-tags"></i> Analyzed Core Keywords
                </div>
                <div id="tagsList" class="tags-list">
                    <!-- Tags will be injected here -->
                </div>
            </div>

            <h2 id="resultsHeader" class="results-header">Personalized Recommendations</h2>
            <div id="animeGrid" class="anime-grid">
                <!-- Anime cards will be injected here -->
            </div>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const promptInput = document.getElementById('promptInput');
            const searchBtn = document.getElementById('searchBtn');
            const loader = document.getElementById('loader');
            const tagsSection = document.getElementById('tagsSection');
            const tagsList = document.getElementById('tagsList');
            const resultsHeader = document.getElementById('resultsHeader');
            const animeGrid = document.getElementById('animeGrid');

            // Auto-resize textarea
            promptInput.addEventListener('input', function () {
                this.style.height = '60px';
                this.style.height = (this.scrollHeight) + 'px';
            });

            // Handle Enter key (Ctrl+Enter to submit, Shift+Enter for new line)
            promptInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    performSearch();
                }
            });

            searchBtn.addEventListener('click', performSearch);

            async function performSearch() {
                const prompt = promptInput.value.trim();

                if (!prompt) {
                    alert('Please enter a search prompt!');
                    promptInput.focus();
                    return;
                }

                // Reset UI state
                animeGrid.style.opacity = '0';
                animeGrid.innerHTML = '';
                tagsSection.style.display = 'none';
                resultsHeader.style.display = 'none';
                loader.style.display = 'flex';
                searchBtn.disabled = true;
                searchBtn.style.opacity = '0.7';

                try {
                    // Make API call
                    const response = await fetch('/recommend', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/plain; charset=UTF-8'
                        },
                        body: prompt
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const data = await response.json();

                    renderTags(data);
                    renderAnimes(data.animes);

                } catch (error) {
                    console.error('Error fetching recommendations:', error);
                    alert('An error occurred while fetching recommendations. Please try again.');
                } finally {
                    loader.style.display = 'none';
                    searchBtn.disabled = false;
                    searchBtn.style.opacity = '1';
                }
            }

            function renderTags(data) {
                if (!data.candidateTags || data.candidateTags.length === 0) return;

                tagsList.innerHTML = '';

                const priorityTag = data.priorityTag;
                const selectedTags = data.selectedTags || [];

                // Prioritize displaying: Priority Tag -> Selected Tags -> Candidate Tags
                // Only show up to 15 tags to keep UI clean
                const displayTags = new Set();

                if (priorityTag) displayTags.add(priorityTag);
                selectedTags.forEach(tag => displayTags.add(tag));

                // Fill remaining up to 12 with candidates if needed
                let idx = 0;
                while (displayTags.size < Math.min(12, data.candidateTags.length) && idx < data.candidateTags.length) {
                    displayTags.add(data.candidateTags[idx]);
                    idx++;
                }

                Array.from(displayTags).forEach(tag => {
                    const tagEl = document.createElement('span');
                    tagEl.className = 'tag';

                    if (tag === priorityTag) {
                        tagEl.classList.add('priority');
                    } else if (selectedTags.includes(tag)) {
                        tagEl.classList.add('selected');
                    }

                    tagEl.textContent = tag;
                    tagsList.appendChild(tagEl);
                });

                tagsSection.style.display = 'block';
            }

            function renderAnimes(animes) {
                if (!animes || animes.length === 0) {
                    animeGrid.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--text-muted);">
                            <i class="fa-regular fa-face-frown" style="font-size: 3rem; margin-bottom: 15px; opacity: 0.5;"></i>
                            <h3>Could not find an anime that matches your criteria.</h3>
                            <p>Please try again with different keywords!</p>
                        </div>
                    `;
                    resultsHeader.style.display = 'block';
                    animeGrid.style.opacity = '1';
                    return;
                }

                animeGrid.innerHTML = animes.map((anime, index) => {
                    // Delay animation staggered
                    const delay = Math.min(index * 0.1, 1);
                    return `
                        <div class="anime-card" style="animation: fadeInUp 0.6s ease-out ${delay}s both;">
                            <div class="cover-img-wrapper">
                                <img src="${anime.coverImage}" alt="${anime.titleEn}" class="cover-img" onerror="this.src='https://via.placeholder.com/300x450/1e293b/94a3b8?text=No+Image'">
                                <div class="score-badge">
                                    <i class="fa-solid fa-star"></i> ${anime.averageScore}
                                </div>
                            </div>
                            <div class="card-content">
                                <h3 class="anime-title">${anime.titleEn}</h3>
                                <div class="anime-synopsis">
                                    ${anime.fullSynopsis.replace(/<br\s*[\/]?>/gi, ' ')}
                                </div>
                            </div>
                            <div class="anime-overlay-synopsis">
                                <h4 class="overlay-title">${anime.titleEn}</h4>
                                <div class="overlay-text">
                                    ${anime.fullSynopsis}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');

                resultsHeader.style.display = 'block';
                // Trigger reflow
                void animeGrid.offsetWidth;
                animeGrid.style.opacity = '1';
            }
        });
    </script>
</body>

</html>
